<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#1a1a2e">
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff" font-family="Arial">定时任务 delivery 问题修复</text>

  <rect x="0" y="48" width="430" height="310" rx="8" fill="#2d1f1f" stroke="#e74c3c" stroke-width="2"/>
  <rect x="0" y="48" width="430" height="36" rx="8" fill="#e74c3c"/>
  <text x="215" y="73" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff" font-family="Arial">❌ 修复前（错误配置）</text>
  <text x="15" y="108" font-size="12" fill="#f5a0a0" font-family="Arial">isolated session 执行 cron</text>
  <text x="15" y="128" font-size="12" fill="#f5a0a0" font-family="Arial">→ channel: "last"</text>
  <text x="15" y="148" font-size="12" fill="#f5a0a0" font-family="Arial">→ 消息投递失败，但状态 ok！</text>
  <text x="215" y="200" text-anchor="middle" font-size="13" fill="#e74c3c" font-family="Arial">⚠️ 状态 ok，消息却没收到</text>

  <polygon points="445,203 430,193 430,213" fill="#ffffff" fill-opacity="0.6"/>
  <line x1="430" y1="203" x2="455" y2="203" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2"/>

  <rect x="470" y="48" width="430" height="310" rx="8" fill="#1f2d1f" stroke="#27ae60" stroke-width="2"/>
  <rect x="470" y="48" width="430" height="36" rx="8" fill="#27ae60"/>
  <text x="685" y="73" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff" font-family="Arial">✅ 修复后（正确配置）</text>
  <text x="485" y="108" font-size="12" fill="#a0e8b0" font-family="Arial">isolated session 执行 cron</text>
  <text x="485" y="128" font-size="12" fill="#a0e8b0" font-family="Arial">→ channel: "qqbot"</text>
  <text x="485" y="148" font-size="12" fill="#a0e8b0" font-family="Arial">→ to: "qqbot:c2c:用户ID"</text>
  <text x="685" y="200" text-anchor="middle" font-size="13" fill="#27ae60" font-family="Arial">✅ 消息精准送达！</text>

  <rect x="470" y="218" width="430" height="44" rx="5" fill="#0d1a0d" stroke="#27ae60" stroke-width="1"/>
  <text x="485" y="238" font-size="10" fill="#7eb87e" font-family="monospace">--announce --channel qqbot</text>
  <text x="485" y="253" font-size="10" fill="#7eb87e" font-family="monospace">--to qqbot:c2c:1D04898... --best-effort-deliver</text>

  <rect x="0" y="372" width="900" height="36" rx="5" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1"/>
  <text x="450" y="396" text-anchor="middle" font-size="12" fill="#7eb8da" font-family="Arial">💡 教训：isolated session 没有"上一个 channel"，channel 必须显式指定！</text>
</svg>
