<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="360" fill="url(#bg3)" rx="12"/>

  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff" font-family="Arial">MCP 三大核心概念</text>

  <!-- Resources -->
  <rect x="30" y="60" width="230" height="250" rx="10" fill="#1e3a5f" stroke="#3498db" stroke-width="2"/>
  <rect x="30" y="60" width="230" height="40" rx="10" fill="#3498db"/>
  <text x="145" y="87" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff" font-family="Arial">📄 Resources</text>
  <text x="145" y="115" text-anchor="middle" font-size="12" fill="#3498db" font-family="Arial">资源 / 只读数据</text>
  <text x="145" y="145" text-anchor="middle" font-size="11" fill="#a0c4e8" font-family="Arial">数据库 Schema</text>
  <text x="145" y="165" text-anchor="middle" font-size="11" fill="#a0c4e8" font-family="Arial">配置文件内容</text>
  <text x="145" y="185" text-anchor="middle" font-size="11" fill="#a0c4e8" font-family="Arial">日志片段</text>
  <text x="145" y="205" text-anchor="middle" font-size="11" fill="#a0c4e8" font-family="Arial">API 返回数据</text>
  <rect x="55" y="225" width="180" height="28" rx="4" fill="#1a4a7a"/>
  <text x="145" y="244" text-anchor="middle" font-size="11" font-weight="bold" fill="#3498db" font-family="Arial">对应 HTTP: GET</text>
  <text x="145" y="295" text-anchor="middle" font-size="10" fill="#7eb8da" font-family="Arial">模型只能读取</text>
  <text x="145" y="310" font-size="10" fill="#7eb8da" text-anchor="middle" font-family="Arial">不能修改</text>

  <!-- Tools -->
  <rect x="285" y="60" width="230" height="250" rx="10" fill="#1e3a5f" stroke="#e74c3c" stroke-width="3"/>
  <rect x="285" y="60" width="230" height="40" rx="10" fill="#e74c3c"/>
  <text x="400" y="87" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff" font-family="Arial">🔧 Tools</text>
  <text x="400" y="115" text-anchor="middle" font-size="12" fill="#e74c3c" font-family="Arial">工具 / 可执行动作 ⭐</text>
  <text x="400" y="145" text-anchor="middle" font-size="11" fill="#f5a0a0" font-family="Arial">get_cpu_usage()</text>
  <text x="400" y="165" text-anchor="middle" font-size="11" fill="#f5a0a0" font-family="Arial">query_database()</text>
  <text x="400" y="185" text-anchor="middle" font-size="11" fill="#f5a0a0" font-family="Arial">send_email()</text>
  <text x="400" y="205" text-anchor="middle" font-size="11" fill="#f5a0a0" font-family="Arial">search_vector_db()</text>
  <rect x="310" y="225" width="180" height="28" rx="4" fill="#7a1a1a"/>
  <text x="400" y="244" text-anchor="middle" font-size="11" font-weight="bold" fill="#e74c3c" font-family="Arial">对应 HTTP: POST</text>
  <text x="400" y="295" text-anchor="middle" font-size="10" fill="#f5a0a0" font-family="Arial">AI 可以真正"动手"执行</text>
  <text x="400" y="310" text-anchor="middle" font-size="10" fill="#f5a0a0" font-family="Arial">这是 MCP 的核心价值</text>

  <!-- Prompts -->
  <rect x="540" y="60" width="230" height="250" rx="10" fill="#1e3a5f" stroke="#9b59b6" stroke-width="2"/>
  <rect x="540" y="60" width="230" height="40" rx="10" fill="#9b59b6"/>
  <text x="655" y="87" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff" font-family="Arial">💡 Prompts</text>
  <text x="655" y="115" text-anchor="middle" font-size="12" fill="#9b59b6" font-family="Arial">提示模板 / 可复用</text>
  <text x="655" y="145" text-anchor="middle" font-size="11" fill="#d0a0e0" font-family="Arial">代码审查模板</text>
  <text x="655" y="165" text-anchor="middle" font-size="11" fill="#d0a0e0" font-family="Arial">周报生成模板</text>
  <text x="655" y="185" text-anchor="middle" font-size="11" fill="#d0a0e0" font-family="Arial">技术方案模板</text>
  <text x="655" y="205" text-anchor="middle" font-size="11" fill="#d0a0e0" font-family="Arial">带参数的快捷指令</text>
  <rect x="565" y="225" width="180" height="28" rx="4" fill="#3a1a5a"/>
  <text x="655" y="244" text-anchor="middle" font-size="11" font-weight="bold" fill="#9b59b6" font-family="Arial">对应: 预定义宏</text>
  <text x="655" y="295" text-anchor="middle" font-size="10" fill="#d0a0e0" font-family="Arial">封装常用操作</text>
  <text x="655" y="310" text-anchor="middle" font-size="10" fill="#d0a0e0" font-family="Arial">一键调用</text>
</svg>
