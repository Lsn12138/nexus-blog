<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)" rx="12"/>

  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff" font-family="Arial">MCP Server 开发流程</text>

  <!-- Step 1 -->
  <rect x="30" y="65" width="170" height="70" rx="8" fill="#2d4a6f" stroke="#4a90d9" stroke-width="2"/>
  <text x="115" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff" font-family="Arial">① 环境准备</text>
  <text x="115" y="110" text-anchor="middle" font-size="11" fill="#a0c4e8" font-family="Arial">npm install</text>
  <text x="115" y="126" text-anchor="middle" font-size="11" fill="#a0c4e8" font-family="Arial">@modelcontextprotocol/sdk</text>

  <!-- Arrow -->
  <line x1="200" y1="100" x2="230" y2="100" stroke="#4a90d9" stroke-width="2" marker-end="url(#arr1)"/>
  <defs><marker id="arr1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4a90d9"/></marker></defs>

  <!-- Step 2 -->
  <rect x="235" y="65" width="170" height="70" rx="8" fill="#2d4a6f" stroke="#4a90d9" stroke-width="2"/>
  <text x="320" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff" font-family="Arial">② 定义工具列表</text>
  <text x="320" y="110" text-anchor="middle" font-size="11" fill="#a0c4e8" font-family="Arial">setRequestHandler</text>
  <text x="320" y="126" text-anchor="middle" font-size="11" fill="#a0c4e8" font-family="Arial">tools/list</text>

  <line x1="405" y1="100" x2="435" y2="100" stroke="#4a90d9" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Step 3 -->
  <rect x="440" y="65" width="170" height="70" rx="8" fill="#2d4a6f" stroke="#4a90d9" stroke-width="2"/>
  <text x="525" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff" font-family="Arial">③ 实现调用逻辑</text>
  <text x="525" y="110" text-anchor="middle" font-size="11" fill="#a0c4e8" font-family="Arial">tools/call handler</text>
  <text x="525" y="126" text-anchor="middle" font-size="11" fill="#a0c4e8" font-family="Arial">参数校验 + 业务逻辑</text>

  <line x1="610" y1="100" x2="640" y2="100" stroke="#4a90d9" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Step 4 -->
  <rect x="645" y="65" width="130" height="70" rx="8" fill="#27ae60" stroke="#2ecc71" stroke-width="2"/>
  <text x="710" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff" font-family="Arial">④ 启动服务</text>
  <text x="710" y="110" text-anchor="middle" font-size="11" fill="#a0e8b0" font-family="Arial">SSEServerTransport</text>
  <text x="710" y="126" text-anchor="middle" font-size="11" fill="#a0e8b0" font-family="Arial">监听端口</text>

  <!-- Second row: Common Issues -->
  <text x="400" y="178" text-anchor="middle" font-size="16" font-weight="bold" fill="#e74c3c" font-family="Arial">⚠️ 三大坑</text>

  <!-- 坑1 -->
  <rect x="30" y="195" width="235" height="90" rx="8" fill="#3d1f1f" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="147" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#e74c3c" font-family="Arial">坑① 传输协议版本冲突</text>
  <text x="147" y="238" text-anchor="middle" font-size="10" fill="#f5a0a0" font-family="Arial">SDK 0.6+ 默认用 streamable-http</text>
  <text x="147" y="254" text-anchor="middle" font-size="10" fill="#f5a0a0" font-family="Arial">但 Claude Desktop 只认 SSE</text>
  <text x="147" y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="#2ecc71" font-family="Arial">✅ 显式指定 SSEServerTransport</text>

  <!-- 坑2 -->
  <rect x="280" y="195" width="235" height="90" rx="8" fill="#3d1f1f" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="397" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#e74c3c" font-family="Arial">坑② 返回格式不对</text>
  <text x="397" y="238" text-anchor="middle" font-size="10" fill="#f5a0a0" font-family="Arial">必须返回 content:[{text:...}]</text>
  <text x="397" y="254" text-anchor="middle" font-size="10" fill="#f5a0a0" font-family="Arial">不能用 {result:...} ！！</text>
  <text x="397" y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="#2ecc71" font-family="Arial">✅ 严格遵循 MCP 响应格式</text>

  <!-- 坑3 -->
  <rect x="530" y="195" width="235" height="90" rx="8" fill="#3d1f1f" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="647" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#e74c3c" font-family="Arial">坑③ 数据库连接池泄漏</text>
  <text x="647" y="238" text-anchor="middle" font-size="10" fill="#f5a0a0" font-family="Arial">MCP 是常驻进程，不能每次</text>
  <text x="647" y="254" text-anchor="middle" font-size="10" fill="#f5a0a0" font-family="Arial">调用 new Database() 用完不关</text>
  <text x="647" y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="#2ecc71" font-family="Arial">✅ 单例模式 + 连接池管理</text>

  <!-- Bottom: -->
  <rect x="30" y="305" width="735" height="75" rx="8" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="400" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff" font-family="Arial">💡 最佳实践</text>
  <text x="400" y="352" text-anchor="middle" font-size="12" fill="#a0c4e8" font-family="Arial">Node.js 快速搭 MCP Server 做协议层  →  HTTP 调用 Java/Python 业务  →  职责分离，好排查</text>
  <text x="400" y="370" text-anchor="middle" font-size="11" fill="#7eb8da" font-family="Arial">Claude Desktop ←→ MCP Server(Node.js) ←→ HTTP → 你的Java业务系统</text>
</svg>
