    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    (function(){
        var c=document.getElementById('canvas-bg');
        if(!c)return;
        var s=new THREE.Scene(),ca=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
        ca.position.z=50;
        var r=new THREE.WebGLRenderer({alpha:true,antialias:true});
        r.setSize(window.innerWidth,window.innerHeight);
        c.appendChild(r.domElement);
        var g=new THREE.SphereGeometry(0.25,12,12),m=new THREE.MeshBasicMaterial({color:0x3B82F6,transparent:true,opacity:0.4}),ps=[];
        for(var i=0;i<40;i++){
            var pm=new THREE.Mesh(g,m.clone());
            pm.position.x=(Math.random()-0.5)*80;pm.position.y=(Math.random()-0.5)*80;pm.position.z=(Math.random()-0.5)*40;
            pm.userData={vx:(Math.random()-0.5)*0.015,vy:(Math.random()-0.5)*0.015};
            ps.push(pm);s.add(pm);
        }
        var ls=[],lm=new THREE.LineBasicMaterial({color:0x3B82F6,transparent:true,opacity:0.06});
        for(var i=0;i<ps.length;i++){
            for(var j=i+1;j<ps.length;j++){
                if(ps[i].position.distanceTo(ps[j].position)<18){
                    var l=new THREE.Line(new THREE.BufferGeometry().setFromPoints([ps[i].position,ps[j].position]),lm);
                    ls.push({line:l,p1:i,p2:j});s.add(l);
                }
            }
        }
        var mx=0,my=0;
        document.addEventListener('mousemove',function(e){mx=(e.clientX-window.innerWidth/2)*0.0003;my=(e.clientY-window.innerHeight/2)*0.0003;});
        window.addEventListener('resize',function(){ca.aspect=window.innerWidth/window.innerHeight;ca.updateProjectionMatrix();r.setSize(window.innerWidth,window.innerHeight);});
        function a(){
            requestAnimationFrame(a);
            ps.forEach(function(p){p.position.x+=p.userData.vx;p.position.y+=p.userData.vy;if(Math.abs(p.position.x)>40)p.userData.vx*=-1;if(Math.abs(p.position.y)>40)p.userData.vy*=-1;});
            ls.forEach(function(c){var pos=c.line.geometry.attributes.position.array;pos[0]=ps[c.p1].position.x;pos[1]=ps[c.p1].position.y;pos[2]=ps[c.p1].position.z;pos[3]=ps[c.p2].position.x;pos[4]=ps[c.p2].position.y;pos[5]=ps[c.p2].position.z;c.line.geometry.attributes.position.needsUpdate=true;});
            ca.position.x+=(mx*8-ca.position.x)*0.01;ca.position.y+=(-my*8-ca.position.y)*0.01;ca.lookAt(s.position);r.render(s,ca);
        }
        a();
    })();
    window.addEventListener('scroll',function(){var s=document.documentElement.scrollTop/(document.documentElement.scrollHeight-document.documentElement.clientHeight)*100;document.getElementById('scroll-progress').style.width=s+'%';});
    var o=new IntersectionObserver(function(e){e.forEach(function(t){if(t.isIntersecting)t.target.classList.add('visible');})},{threshold:0.1});
    document.querySelectorAll('.fade-up').forEach(function(el){o.observe(el);});
    </script>
