<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | NEXUS</title>
    <meta name="description" content="{{description}}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/article-style.css">
    <link rel="stylesheet" href="/css/nexus-enhancements.css">
    <link rel="icon" href="https://images.mfanjk.com/2026/03/27/1774603940729">
</head>
<body>
    <!-- Canvas Background -->
    <div id="canvas-bg"></div>
    
    <!-- Scroll Progress -->
    <div class="scroll-progress" id="scroll-progress"></div>
    
    <!-- Header -->
    <header class="header" id="header">
        <a href="/" class="logo">NEXUS</a>
        <nav class="nav-links">
            <a href="/">首页</a>
            <a href="/archives/">归档</a>
            <a href="/categories/">分类</a>
            <a href="/tags/">标签</a>
            <a href="/about/">关于</a>
        </nav>
    </header>

    <!-- Article Hero -->
    <section class="article-hero">
        <div class="article-hero-gradient"></div>
        <div class="article-hero-content">
            <div class="article-meta-top">
                <span class="article-date">{{date}}</span>
                <span class="article-category">{{category}}</span>
            </div>
            <h1 class="article-title">{{title}}</h1>
            <p class="article-excerpt">{{excerpt}}</p>
            <div class="article-tags">
                {{tags}}
            </div>
        </div>
    </section>

    <!-- Article Content -->
    <article class="article-content-wrapper">
        <div class="article-content">
            {{content}}
        </div>
    </article>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 NEXUS — All Rights Reserved</p>
        <p><a href="/" class="footer-link">返回首页</a></p>
    </footer>

    <style>
    /* ========== Article Page Styles - Match Homepage v7.0 ========== */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
        --bg-primary: #FFFFFF;
        --bg-secondary: #F8FAFC;
        --bg-card: #FFFFFF;
        --bg-elevated: #F1F5F9;
        --border: rgba(0, 0, 0, 0.06);
        --border-hover: rgba(0, 0, 0, 0.12);
        --text-primary: #0A0A0A;
        --text-secondary: #64748B;
        --text-muted: #94A3B8;
        --accent: #2563EB;
        --accent-glow: rgba(37, 99, 235, 0.1);
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Source Han Sans SC', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
        font-family: var(--font-sans);
        background: var(--bg-primary);
        color: var(--text-primary);
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
    }

    #canvas-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
        opacity: 0.4;
    }

    .scroll-progress {
        position: fixed;
        top: 0;
        left: 0;
        width: 0%;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        z-index: 9999;
    }

    .header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 0 48px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
    }

    .logo {
        font-size: 18px;
        font-weight: 600;
        color: var(--text-primary);
        text-decoration: none;
    }

    .nav-links {
        display: flex;
        gap: 40px;
    }

    .nav-links a {
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 13px;
        transition: color 0.3s;
    }

    .nav-links a:hover { color: var(--text-primary); }

    .article-hero {
        position: relative;
        padding: 160px 48px 80px;
        text-align: center;
        background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        z-index: 1;
    }

    .article-hero-gradient {
        position: absolute;
        top: 10%;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
        height: 500px;
        background: radial-gradient(ellipse, rgba(37, 99, 235, 0.06) 0%, transparent 60%);
        pointer-events: none;
    }

    .article-hero-content {
        max-width: 800px;
        margin: 0 auto;
        position: relative;
    }

    .article-meta-top {
        display: flex;
        justify-content: center;
        gap: 24px;
        margin-bottom: 24px;
    }

    .article-date, .article-category {
        font-size: 12px;
        color: var(--text-muted);
        letter-spacing: 1px;
    }

    .article-category {
        color: var(--accent);
    }

    .article-title {
        font-size: clamp(32px, 5vw, 56px);
        font-weight: 600;
        letter-spacing: -1px;
        line-height: 1.2;
        margin-bottom: 24px;
        color: var(--text-primary);
    }

    .article-excerpt {
        font-size: 16px;
        color: var(--text-secondary);
        line-height: 1.8;
        margin-bottom: 32px;
        font-weight: 300;
    }

    .article-tags {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
    }

    .article-tag {
        font-size: 11px;
        color: var(--text-muted);
        background: var(--bg-elevated);
        padding: 6px 14px;
        border-radius: 6px;
        letter-spacing: 0.5px;
    }

    .article-content-wrapper {
        max-width: 800px;
        margin: 0 auto;
        padding: 80px 48px;
        position: relative;
        z-index: 1;
    }

    .article-content {
        font-size: 16px;
        line-height: 1.9;
        color: var(--text-secondary);
    }

    .article-content h2 {
        font-size: 28px;
        font-weight: 600;
        color: var(--text-primary);
        margin: 48px 0 24px;
        letter-spacing: -0.5px;
    }

    .article-content h3 {
        font-size: 22px;
        font-weight: 600;
        color: var(--text-primary);
        margin: 36px 0 18px;
    }

    .article-content p {
        margin-bottom: 24px;
    }

    .article-content a {
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px solid var(--accent-glow);
        transition: border-color 0.3s;
    }

    .article-content a:hover {
        border-color: var(--accent);
    }

    .article-content code {
        font-family: 'SF Mono', Monaco, monospace;
        font-size: 14px;
        background: var(--bg-elevated);
        padding: 2px 8px;
        border-radius: 4px;
        color: var(--accent);
    }

    .article-content pre {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        overflow-x: auto;
        margin: 24px 0;
    }

    .article-content pre code {
        background: none;
        padding: 0;
        color: var(--text-primary);
    }

    .article-content blockquote {
        border-left: 3px solid var(--accent);
        padding-left: 24px;
        margin: 24px 0;
        font-style: italic;
        color: var(--text-secondary);
    }

    .article-content ul, .article-content ol {
        margin: 24px 0;
        padding-left: 24px;
    }

    .article-content li {
        margin-bottom: 12px;
    }

    .article-content img {
        max-width: 100%;
        border-radius: 12px;
        margin: 24px 0;
    }

    .footer {
        background: var(--bg-primary);
        border-top: 1px solid var(--border);
        padding: 48px;
        text-align: center;
    }

    .footer p {
        font-size: 13px;
        color: var(--text-muted);
        margin: 8px 0;
    }

    .footer-link {
        color: var(--text-secondary);
        text-decoration: none;
    }

    .footer-link:hover {
        color: var(--text-primary);
    }

    @media (max-width: 768px) {
        .header { padding: 0 24px; }
        .nav-links { gap: 20px; }
        .article-hero { padding: 120px 24px 60px; }
        .article-content-wrapper { padding: 60px 24px; }
    }
    </style>

    <script src="/js/nexus-data.js"></script>
    <script src="/js/nexus-site.js"></script>
    <script>
    (function() {
        var canvas = document.createElement('canvas');
        var ctx = canvas.getContext('2d');
        var container = document.getElementById('canvas-bg');
        container.appendChild(canvas);
        
        var width, height;
        var particles = [];
        var gridSize = 60;
        var particleCount = 50;
        
        function init() {
            resize();
            createParticles();
            animate();
            window.addEventListener('resize', resize);
        }
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        function createParticles() {
            particles = [];
            for (var i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.2,
                    vy: (Math.random() - 0.5) * 0.2,
                    size: Math.random() * 1.5 + 0.5,
                    alpha: Math.random() * 0.2 + 0.05
                });
            }
        }
        
        function drawGrid() {
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.03)';
            ctx.lineWidth = 1;
            for (var x = 0; x <= width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (var y = 0; y <= height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
        }
        
        function drawParticles() {
            particles.forEach(function(p) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(37, 99, 235, ' + p.alpha + ')';
                ctx.fill();
            });
        }
        
        function animate() {
            ctx.clearRect(0, 0, width, height);
            drawGrid();
            drawParticles();
            requestAnimationFrame(animate);
        }
        
        init();
    })();

    window.addEventListener('scroll', function() {
        var s = document.documentElement.scrollTop / (document.documentElement.scrollHeight - document.documentElement.clientHeight) * 100;
        document.getElementById('scroll-progress').style.width = s + '%';
    });
    </script>
</body>
</html>
